<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportMeet — Agenda</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app">

  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><path d="M1 8h2v3H1zM5 6h2v5H5zM9 4h2v7H9zM13 2h2v9h-2z"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 5c1.5-1.5 3.5-2.5 6-2.5s4.5 1 6 2.5M4 7.5c1-1 2.5-1.5 4-1.5s3 .5 4 1.5M6.5 10c.4-.4 1-.6 1.5-.6s1.1.2 1.5.6"/></svg>
      <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x="1" y="1" width="20" height="10" rx="2.5" stroke="currentColor" stroke-opacity=".4" stroke-width="1"/><rect x="3" y="3" width="16" height="6" rx="1" fill="currentColor"/><rect x="22" y="4" width="1.5" height="4" rx=".5" fill="currentColor" opacity=".4"/></svg>
    </div>
  </div>

  <div class="screen-header-plain">
    <div class="screen-title">Minha agenda</div>
  </div>

  <div class="screen-content">

    <!-- Calendário renderizado por JS -->
    <div class="calendar-wrap">
      <div class="cal-nav">
        <button class="cal-nav-btn" id="cal-prev">&#8249;</button>
        <span class="cal-month" id="cal-month">Abril 2026</span>
        <button class="cal-nav-btn" id="cal-next">&#8250;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- Próximos eventos -->
    <div class="section-label">Próximos Eventos</div>

    <!-- Basquete — sempre visível (evento pré-existente), clicável -->
    <a href="detalhes-basquete.html" id="agenda-basquete" class="event-row" data-day="30" style="text-decoration:none;color:inherit">
      <div class="event-date">
        <div class="event-date-day">QUI</div>
        <div class="event-date-num">30</div>
      </div>
      <div class="event-row-info">
        <div class="event-row-name">Basquete no Brooklin</div>
        <div class="event-row-sub">18:00 · Quadra Brooklin</div>
      </div>
      <div class="event-row-arrow">›</div>
    </a>

    <!-- Futebol — só aparece após adicionar via buscar -->
    <a href="detalhes-busca.html" id="agenda-futebol" class="event-row" data-day="26" style="display:none;text-decoration:none;color:inherit">
      <div class="event-date">
        <div class="event-date-day">DOM</div>
        <div class="event-date-num">26</div>
      </div>
      <div class="event-row-info">
        <div class="event-row-name">Futebol com o Bruno</div>
        <div class="event-row-sub">19:00 · Brooklin</div>
      </div>
      <div class="event-row-arrow">›</div>
    </a>

    <!-- Evento do feed — só aparece após aceitar via feed -->
    <a href="detalhes-feed.html" id="agenda-feed" class="event-row" data-day="" style="display:none;text-decoration:none;color:inherit">
      <div class="event-date">
        <div class="event-date-day" id="agenda-feed-day">—</div>
        <div class="event-date-num" id="agenda-feed-num">—</div>
      </div>
      <div class="event-row-info">
        <div class="event-row-name" id="agenda-feed-name">Evento do feed</div>
        <div class="event-row-sub" id="agenda-feed-sub">—</div>
      </div>
      <div class="event-row-arrow">›</div>
    </a>

    <!-- Corrida — só aparece após criar via fluxo -->
    <a href="detalhes-evento.html" id="agenda-corrida" class="event-row" data-day="29" style="display:none;text-decoration:none;color:inherit">
      <div class="event-date">
        <div class="event-date-day">QUA</div>
        <div class="event-date-num">29</div>
      </div>
      <div class="event-row-info">
        <div class="event-row-name" id="agenda-corrida-name">Corrida no Ibirapuera</div>
        <div class="event-row-sub" id="agenda-corrida-sub">10:00 · Criado por você</div>
      </div>
      <div class="event-row-arrow">›</div>
    </a>

  </div>

  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
      Início
    </a>
    <a href="buscar.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Buscar
    </a>
    <a href="criar-evento.html" class="nav-plus">+</a>
    <a href="agenda.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Agenda
    </a>
    <a href="perfil.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Perfil
    </a>
  </nav>

</div>
<script src="../js/app.js"></script>
</body>
</html>
