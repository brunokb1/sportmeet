<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#22C55E">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="../manifest.webmanifest">
  <title>SportMeet — Adicionado à Agenda</title>
  <link rel="stylesheet" href="../css/style.css?v=7">
</head>
<body>
<div class="app">

  <div class="success-wrap">

    <div class="success-label">Adicionado à agenda</div>

    <div class="success-icon green">
      <svg aria-hidden="true" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
    </div>

    <div class="success-h">Adicionado à<br>sua agenda!</div>
    <p class="success-p">Você receberá um lembrete 1 hora antes do evento começar.</p>

    <div class="success-card">
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2)">
          <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span id="ev-added-time"><b>—</b></span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-3)">
          <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 7-8 13-8 13s-8-6-8-13a8 8 0 0116 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="ev-added-local">—</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-3)">
          <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span id="ev-added-info">—</span>
        </div>
      </div>
    </div>

    <div class="success-buttons">
      <a href="agenda.html" class="btn btn-outline">VER NA AGENDA</a>
      <a href="../index.html" class="btn btn-green">VOLTAR PARA O INÍCIO</a>
    </div>

  </div>

  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
      Início
    </a>
    <a href="buscar.html" class="nav-item">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Buscar
    </a>
    <a href="criar-evento.html" class="nav-plus">+</a>
    <a href="agenda.html" class="nav-item active">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Agenda
    </a>
    <a href="perfil.html" class="nav-item">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Perfil
    </a>
  </nav>

</div>
<script src="../js/store.js?v=7"></script>
<script src="../js/app.js?v=7"></script>
</body>
</html>
