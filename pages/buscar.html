<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#22C55E">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="../manifest.webmanifest">
  <title>SportMeet — Buscar</title>
  <link rel="stylesheet" href="../css/style.css?v=4">
</head>
<body>
<div class="app">

  <div class="screen-header-plain">
    <div class="screen-title">Buscar evento</div>
  </div>

  <div class="screen-content">

    <!-- Barra de busca livre -->
    <div class="search-bar mb-12">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Nome do evento, local, organizador..."
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>

    <!-- Resultados ao vivo -->
    <div id="live-results"></div>

    <!-- Filtros inteligentes -->
    <div class="search-filter-section">

      <!-- Tipo de atividade (autocomplete livre) -->
      <label class="search-filter-label">Tipo de atividade</label>
      <div style="position:relative;margin-bottom:14px">
        <input class="form-input" id="filter-activity" type="text"
               placeholder="Ex: Futebol, Corrida, Yoga..."
               autocomplete="off" style="padding-right:36px">
      </div>

      <!-- Horário -->
      <label class="search-filter-label">Horário</label>
      <div class="period-pills mb-14">
        <div class="period-pill" data-val="manhã">🌅 Manhã</div>
        <div class="period-pill" data-val="tarde">☀️ Tarde</div>
        <div class="period-pill" data-val="noite">🌙 Noite</div>
      </div>

      <!-- Data específica -->
      <label class="search-filter-label">Data</label>
      <button class="search-filter-btn mb-14" id="filter-date-btn" type="button">
        <svg class="sbtn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span id="filter-date-disp">Qualquer data</span>
        <button class="search-filter-clear" title="Limpar">✕</button>
      </button>
      <input type="hidden" id="filter-date-val">

      <!-- Faixa etária -->
      <label class="search-filter-label">Faixa etária</label>
      <div id="filter-age-ctrl" class="mb-14"></div>
      <input type="hidden" id="filter-age-val" value="Livre">

      <!-- Local / Bairro -->
      <label class="search-filter-label">Bairro / Região</label>
      <div style="position:relative">
        <input class="form-input" id="filter-local" type="text"
               placeholder="Ex: Brooklin, Pinheiros, Moema..."
               autocomplete="off">
      </div>

    </div>

    <button class="btn btn-green mt-8" id="filter-btn" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      BUSCAR EVENTOS
    </button>

  </div>

  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
      Início
    </a>
    <a href="buscar.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Buscar
    </a>
    <a href="criar-evento.html" class="nav-plus">+</a>
    <a href="agenda.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Agenda
    </a>
    <a href="perfil.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Perfil
    </a>
  </nav>

</div>
<script src="../js/store.js?v=5"></script>
<script src="../js/app.js?v=5"></script>
</body>
</html>
