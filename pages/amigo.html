<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SportMeet — Perfil do amigo</title>
  <link rel="stylesheet" href="../css/style.css?v=4">
</head>
<body>
<div class="app">

  <div class="screen-header">
    <button class="back-btn" onclick="window.history.back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="screen-title" id="friend-page-title">Perfil</span>
  </div>

  <div class="screen-content">

    <!-- Hero do amigo -->
    <div class="profile-hero">
      <div class="profile-avatar" id="friend-avatar">
        <span id="friend-initials">?</span>
      </div>
      <div class="profile-info">
        <div class="profile-name"     id="friend-name">—</div>
        <div class="profile-user"     id="friend-username">—</div>
        <div class="profile-bio"      id="friend-bio"></div>
        <div class="profile-location" id="friend-location"></div>
      </div>
      <button class="profile-edit" id="friend-follow-btn">+ Seguir</button>
    </div>

    <!-- Estatísticas -->
    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-num" id="friend-stat-participated">—</div>
        <div class="stat-label">Eventos<br>participados</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="friend-stat-created">—</div>
        <div class="stat-label">Eventos<br>criados</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="friend-stat-friends">—</div>
        <div class="stat-label">Amigos</div>
      </div>
    </div>

    <!-- Atividades -->
    <div class="section-label mb-8">Atividades</div>
    <div class="sports-row mb-16" id="friend-sports"></div>

    <!-- Eventos criados pelo amigo -->
    <div class="section-label mb-8">Eventos criados</div>
    <div id="friend-events-list"></div>

  </div>

  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
      Início
    </a>
    <a href="buscar.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Buscar
    </a>
    <a href="criar-evento.html" class="nav-plus">+</a>
    <a href="agenda.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Agenda
    </a>
    <a href="perfil.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Perfil
    </a>
  </nav>

</div>
<script src="../js/store.js?v=5"></script>
<script src="../js/app.js?v=5"></script>
</body>
</html>
