<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SportMeet — Confirmar Cancelamento</title>
  <link rel="stylesheet" href="../css/style.css?v=4">
</head>
<body>
<div class="app">

  <div class="screen-header">
    <button class="back-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="screen-title">Confirmar cancelamento</span>
  </div>

  <div class="screen-content">

    <div class="warning-box mb-16">
      <div class="warning-icon">⚠️</div>
      <p>
        Tem certeza que deseja cancelar o evento <em id="ev-cancel-name">"..."</em> em
        <b id="ev-cancel-date">...?</b><br><br>
        Esta ação não pode ser desfeita. Todos os participantes serão notificados.
      </p>
    </div>

    <div class="form-group mb-16">
      <label class="form-label">Motivo (opcional)</label>
      <textarea class="form-input" placeholder="Conta pros participantes o que aconteceu..."></textarea>
    </div>

    <div class="warn-participants mb-16">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      <span>Todos os participantes serão notificados</span>
    </div>

    <div class="btn-row">
      <button onclick="goBack()" class="btn btn-outline">NÃO, VOLTAR</button>
      <button type="button" class="btn btn-red" id="btn-sim-cancelar">SIM, CANCELAR</button>
    </div>

  </div>

  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
      Início
    </a>
    <a href="buscar.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Buscar
    </a>
    <a href="criar-evento.html" class="nav-plus">+</a>
    <a href="agenda.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Agenda
    </a>
    <a href="perfil.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Perfil
    </a>
  </nav>

</div>
<script src="../js/store.js?v=5"></script>
<script src="../js/app.js?v=5"></script>
</body>
</html>
