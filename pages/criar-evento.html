<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SportMeet — Criar Evento</title>
  <link rel="stylesheet" href="../css/style.css?v=4">
</head>
<body>
<div class="app">

  <div class="screen-header">
    <a href="../index.html" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="screen-title">Criar evento</span>
  </div>

  <div class="screen-content">

    <!-- Tipo de atividade — autocomplete livre -->
    <div class="form-group" style="position:relative">
      <label class="form-label" for="input-tipo">Tipo de atividade</label>
      <input class="form-input" id="input-tipo" type="text"
             placeholder="Ex: Futebol, Corrida, Yoga..."
             autocomplete="off">
      <!-- dropdown inserido por JS -->
    </div>

    <!-- Título do evento -->
    <div class="form-group">
      <label class="form-label" for="input-atividade">Título do evento</label>
      <input class="form-input" id="input-atividade" type="text"
             placeholder="Ex: Corrida matinal no parque"
             autocomplete="off">
    </div>

    <!-- Local — com autocomplete -->
    <div class="form-group" style="position:relative">
      <label class="form-label" for="input-local">Local</label>
      <input class="form-input" id="input-local" type="text"
             placeholder="Digite para buscar um local..."
             autocomplete="off">
      <!-- dropdown inserido por JS -->
    </div>

    <!-- Data e hora — picker custom -->
    <div class="form-group">
      <label class="form-label">Data e hora</label>
      <button class="form-input dt-trigger" id="btn-datetime" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;color:var(--text-4)"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span style="color:var(--text-4)" id="dt-display">Toque para selecionar data e hora</span>
      </button>
      <input type="hidden" id="input-datetime" value="">
    </div>

    <!-- Duração e máx. participantes -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label" for="input-duracao">Duração</label>
        <select class="form-input" id="input-duracao">
          <option value="30min">30 min</option>
          <option value="45min">45 min</option>
          <option value="1h" selected>1 hora</option>
          <option value="1h30">1h 30min</option>
          <option value="2h">2 horas</option>
          <option value="2h30">2h 30min</option>
          <option value="3h">3 horas</option>
          <option value="3h+">3h+</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="input-max">Máx. participantes</label>
        <input class="form-input" id="input-max" type="number" min="2" max="100"
               placeholder="20" inputmode="numeric">
      </div>
    </div>

    <!-- Faixa etária — sliders -->
    <div class="form-group">
      <label class="form-label">Faixa etária</label>
      <div id="age-range-ctrl"></div>
      <input type="hidden" id="input-faixa" value="Livre">
    </div>

    <!-- Descrição -->
    <div class="form-group">
      <label class="form-label" for="input-desc">Descrição <span style="font-weight:400;color:var(--text-4)">(opcional)</span></label>
      <textarea class="form-input" id="input-desc"
                placeholder="Descreva o evento: nível de habilidade, o que levar, regras..." style="height:100px"></textarea>
    </div>

    <!-- Toggle aberto/fechado -->
    <div class="toggle-row mb-16">
      <div class="toggle-left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <div>
          <div class="toggle-text">Evento aberto</div>
          <div class="toggle-sub">Qualquer pessoa pode entrar</div>
        </div>
      </div>
      <button class="toggle-switch" aria-label="Alternar evento aberto"></button>
    </div>

    <a href="convidar-amigos.html" class="btn btn-green" id="invite-friends-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      CONTINUAR: CONVIDAR AMIGOS
    </a>

  </div>

  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
      Início
    </a>
    <a href="buscar.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Buscar
    </a>
    <a href="criar-evento.html" class="nav-plus" style="background:var(--green)">+</a>
    <a href="agenda.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Agenda
    </a>
    <a href="perfil.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Perfil
    </a>
  </nav>

</div>
<script src="../js/store.js?v=5"></script>
<script src="../js/app.js?v=5"></script>
</body>
</html>
