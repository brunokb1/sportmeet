<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#22C55E">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="../manifest.webmanifest">
  <title>SportMeet — Evento Cancelado</title>
  <link rel="stylesheet" href="../css/style.css?v=7">
</head>
<body>
<div class="app">

  <div class="success-wrap">

    <div class="success-label">Evento cancelado</div>

    <div class="success-icon red">
      <svg aria-hidden="true" width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>

    <div class="success-h">Participação<br>cancelada</div>
    <p class="success-p">O organizador foi notificado sobre o cancelamento.</p>

    <div class="success-card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="background:var(--bg);border-radius:8px;padding:6px 10px;text-align:center;flex-shrink:0">
          <div style="font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase" id="ev-day-label">—</div>
          <div style="font-size:20px;font-weight:800;color:var(--text-1);line-height:1" id="ev-day-num">—</div>
        </div>
        <div>
          <div style="font-weight:700;font-size:14px" id="ev-title">—</div>
          <div style="font-size:12px;color:var(--text-3)" id="ev-sub">—</div>
        </div>
      </div>
      <div class="notif-info">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="ev-notif">Os participantes foram notificados por push.</span>
      </div>
    </div>

    <div class="success-buttons">
      <a href="buscar.html" class="btn btn-outline">VER OUTROS EVENTOS</a>
      <a href="agenda.html" class="btn btn-green">VOLTAR PARA O CALENDÁRIO</a>
    </div>

  </div>

  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
      Início
    </a>
    <a href="buscar.html" class="nav-item">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Buscar
    </a>
    <a href="criar-evento.html" class="nav-plus">+</a>
    <a href="agenda.html" class="nav-item active">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Agenda
    </a>
    <a href="perfil.html" class="nav-item">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Perfil
    </a>
  </nav>

</div>
<script src="../js/store.js?v=7"></script>
<script src="../js/app.js?v=7"></script>
</body>
</html>
