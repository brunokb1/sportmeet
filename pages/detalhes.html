<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportMeet — Detalhes do Evento</title>
  <link rel="stylesheet" href="../css/style.css?v=4">
</head>
<body>
<div class="app">

  <div class="screen-header">
    <button class="back-btn" onclick="window.history.back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="screen-title" id="det-title">Detalhes do evento</span>
  </div>

  <!-- Mapa -->
  <div class="map-box">
    <div class="map-pin-wrap">📍</div>
    <div class="map-label" id="det-map-label">Local do evento</div>
  </div>

  <div class="screen-content">

    <!-- Banner dinâmico -->
    <div id="det-banner"></div>

    <!-- Status badge -->
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <span id="det-status-badge" class="tag" style="padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700">Aberto</span>
    </div>

    <!-- Informações -->
    <div class="info-section mb-16">
      <div class="info-row">
        <div class="info-icon green">🕐</div>
        <div class="info-row-body">
          <div class="info-label">Horário</div>
          <div class="info-value" id="det-horario">—</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon orange">📍</div>
        <div class="info-row-body">
          <div class="info-label">Local</div>
          <div class="info-value" id="det-local">—</div>
          <div class="info-value" id="det-address" style="font-size:12px;color:var(--text-3);margin-top:2px"></div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon blue">👥</div>
        <div class="info-row-body">
          <div class="info-label">Faixa etária</div>
          <div class="info-value" id="det-age">—</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon green">📝</div>
        <div class="info-row-body">
          <div class="info-label">Descrição</div>
          <div class="info-value" id="det-desc">—</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon blue">👤</div>
        <div class="info-row-body">
          <div class="info-label">Organizador</div>
          <div class="info-value" id="det-creator">—</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon orange">👥</div>
        <div class="info-row-body">
          <div class="info-label" id="det-part-label">Participantes</div>
          <div class="info-value" style="margin-top:6px">
            <div class="avatar-row" id="det-avatars"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Botões -->
    <div class="btn-row">
      <button class="btn btn-outline" onclick="window.history.back()">VOLTAR</button>
      <a href="#" class="btn btn-green" id="btn-add">ADICIONAR À AGENDA</a>
      <a href="#" class="btn btn-red"   id="btn-cancel" style="display:none">CANCELAR PARTICIPAÇÃO</a>
    </div>

  </div>

  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
      Início
    </a>
    <a href="buscar.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Buscar
    </a>
    <a href="criar-evento.html" class="nav-plus">+</a>
    <a href="agenda.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Agenda
    </a>
    <a href="perfil.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Perfil
    </a>
  </nav>

</div>
<script src="../js/store.js?v=5"></script>
<script src="../js/app.js?v=5"></script>
</body>
</html>
