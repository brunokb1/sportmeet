<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#22C55E">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">
  <title>SportMeet</title>
  <link rel="stylesheet" href="css/style.css?v=7">
</head>
<body>
<div class="app">

  <div class="app-header">
    <div class="logo">Sport<span class="green">Meet</span></div>
    <div class="header-right">
      <a href="pages/notificacoes.html" style="color:var(--text-2);display:flex;align-items:center;position:relative" aria-label="Notificações">
        <svg aria-hidden="true" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        <span id="bell-badge" class="bell-badge" style="display:none" aria-hidden="true"></span>
      </a>
      <a href="pages/perfil.html">
        <div class="avatar av-md av-orange" id="header-avatar">LF</div>
      </a>
    </div>
  </div>

  <div class="screen-content home-screen">

    <div class="home-grid">

      <a href="pages/agenda.html" class="home-card home-card-events" style="text-decoration:none;color:inherit;display:block">
        <div class="home-card-header">
          <div class="home-card-title">Esta Semana</div>
          <svg aria-hidden="true" class="home-card-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div id="week-events">
          <div class="mini-event" style="color:var(--text-4);font-size:12px">Carregando...</div>
        </div>
      </a>

      <a href="pages/notificacoes.html" class="home-card home-card-invites" style="text-decoration:none;color:inherit;display:block">
        <div class="home-card-header">
          <div class="home-card-title">Convites</div>
          <svg aria-hidden="true" class="home-card-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3z"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        </div>
        <div id="home-invites">
          <div class="mini-event" style="color:var(--text-4);font-size:12px">Carregando...</div>
        </div>
      </a>

    </div>

    <!-- Filtro de esportes do feed -->
    <div class="feed-sport-chips" id="feed-sport-chips" style="display:none"></div>

    <div class="feed-header">
      <span class="feed-title-text">Feed · Eventos para você</span>
      <span class="badge-new" id="badge-new">12 novos</span>
    </div>

    <div class="swipe-stack" id="swipe-stack"></div>

    <div class="action-buttons">
      <button class="action-btn reject" id="btn-reject">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <button class="action-btn accept" id="btn-accept">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </div>
    <div class="swipe-hint">← recusar &nbsp;·&nbsp; adicionar →</div>

    <!-- Amigos ativos -->
    <div class="section-label mt-8">Amigos ativos</div>
    <div class="friends-active-row" id="friends-active-row"></div>

  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
      Início
    </a>
    <a href="pages/buscar.html" class="nav-item">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Buscar
    </a>
    <a href="pages/criar-evento.html" class="nav-plus">+</a>
    <a href="pages/agenda.html" class="nav-item">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Agenda
    </a>
    <a href="pages/perfil.html" class="nav-item">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Perfil
    </a>
  </nav>

</div>
<!-- PWA install banner -->
<div id="pwa-banner" style="display:none;position:fixed;bottom:calc(74px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:var(--text-1);color:#fff;border-radius:14px;padding:12px 18px;font-size:13px;font-weight:600;display:none;align-items:center;gap:12px;z-index:999;box-shadow:0 6px 24px rgba(0,0,0,.25);white-space:nowrap" aria-live="polite">
  <span>📲 Instalar SportMeet</span>
  <button id="pwa-install" style="background:var(--green);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer">INSTALAR</button>
  <button id="pwa-dismiss" style="background:none;border:none;color:rgba(255,255,255,.6);font-size:18px;cursor:pointer;width:28px;height:28px;padding:0" aria-label="Dispensar">✕</button>
</div>
<script src="js/store.js?v=7"></script>
<script src="js/app.js?v=7"></script>
<script>
  // Service worker registration
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
  // PWA install prompt
  let _deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    _deferredPrompt = e;
    const banner = document.getElementById('pwa-banner');
    if (banner) banner.style.display = 'flex';
  });
  document.getElementById('pwa-install')?.addEventListener('click', () => {
    _deferredPrompt?.prompt();
    _deferredPrompt?.userChoice.then(() => {
      document.getElementById('pwa-banner').style.display = 'none';
      _deferredPrompt = null;
    });
  });
  document.getElementById('pwa-dismiss')?.addEventListener('click', () => {
    document.getElementById('pwa-banner').style.display = 'none';
  });
</script>
</body>
</html>
