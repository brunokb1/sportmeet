<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#22C55E">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">
  <title>SportMeet</title>
  <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>
<div class="app">

  <div class="app-header">
    <div class="logo">Sport<span class="green">Meet</span></div>
    <div class="header-right">
      <a href="pages/notificacoes.html" style="color:var(--text-2);display:flex;align-items:center">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      </a>
      <a href="pages/perfil.html">
        <div class="avatar av-md av-orange" id="header-avatar">LF</div>
      </a>
    </div>
  </div>

  <div class="screen-content home-screen">

    <div class="home-grid">

      <a href="pages/agenda.html" class="home-card" style="text-decoration:none;color:inherit;display:block">
        <div class="home-card-title">Esta Semana</div>
        <div id="week-events">
          <div class="mini-event" style="color:var(--text-4);font-size:12px">Carregando...</div>
        </div>
      </a>

      <a href="pages/notificacoes.html" class="home-card" style="text-decoration:none;color:inherit;display:block">
        <div class="home-card-title">Convites Pendentes</div>
        <div id="home-invites">
          <div class="mini-event" style="color:var(--text-4);font-size:12px">Carregando...</div>
        </div>
      </a>

    </div>

    <div class="feed-header">
      <span class="feed-title-text">Feed · Eventos para você</span>
      <span class="badge-new" id="badge-new">12 novos</span>
    </div>

    <div class="swipe-stack" id="swipe-stack"></div>

    <div class="action-buttons">
      <button class="action-btn reject" id="btn-reject">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <button class="action-btn accept" id="btn-accept">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </div>
    <div class="swipe-hint">← recusar &nbsp;·&nbsp; adicionar →</div>

  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
      Início
    </a>
    <a href="pages/buscar.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Buscar
    </a>
    <a href="pages/criar-evento.html" class="nav-plus">+</a>
    <a href="pages/agenda.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Agenda
    </a>
    <a href="pages/perfil.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Perfil
    </a>
  </nav>

</div>
<script src="js/store.js?v=5"></script>
<script src="js/app.js?v=5"></script>
</body>
</html>
